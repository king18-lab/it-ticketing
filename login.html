<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Login | Stackly Ticketing – AI IT Support</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #0e9f6e;
            --primary-light: #34d399;
            --dark-bg: #0a0a0a;
            --dark-card: #0f111a;
            --dark-light: #1a1e2a;
            --white: #ffffff;
            --gray-light: #e0e0e0;
            --gray-medium: #9e9e9e;
            --border-light: #2a2a2a;
            --error: #ef4444;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg), var(--dark-card));
            min-height: 100vh;
        }

        .login-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* LEFT PANEL – BRAND / HERO */
        .login-brand-panel {
            width: 50%;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.92), rgba(16, 185, 129, 0.15)),
                        url('https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .login-brand-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                rgba(16, 185, 129, 0.08) 0px,
                rgba(16, 185, 129, 0.08) 12px,
                transparent 12px,
                transparent 24px
            );
            pointer-events: none;
        }

        .brand-logo {
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-tagline {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
            color: var(--gray-light);
        }

        .brand-heading {
            font-size: 28px;
            font-weight: 600;
            max-width: 450px;
            line-height: 1.4;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .brand-features {
            display: flex;
            gap: 32px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature-item {
            text-align: center;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.4);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid rgba(16,185,129,0.4);
        }

        .feature-item i {
            width: 28px;
            height: 28px;
            color: var(--primary);
            margin-right: 8px;
            vertical-align: middle;
        }

        .feature-item span {
            font-size: 14px;
            font-weight: 500;
        }

        .back-home-btn {
            margin-top: 48px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--white);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 1;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }

        .back-home-btn:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(16,185,129,0.3);
        }

        /* RIGHT PANEL – LOGIN FORM */
        .login-form-panel {
            width: 50%;
            background: var(--dark-card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            position: relative;
        }

        .login-form-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
        }

        .form-container {
            width: 100%;
            max-width: 460px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h1 {
            font-size: 32px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--gray-medium);
        }

        .form-header a {
            color: var(--primary) !important;
            font-weight: 600;
            text-decoration: none;
        }

        .form-header a:hover {
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--white);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--gray-medium);
            pointer-events: none;
        }

        input, select {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid var(--dark-light);
            border-radius: 16px;
            font-size: 14px;
            outline: none;
            background-color: var(--dark-light);
            color: var(--white);
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        input::placeholder {
            color: var(--gray-medium);
        }

        select option {
            background: var(--dark-card);
            color: var(--white);
        }

        .login-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 28px;
            color: var(--gray-medium);
        }

        .login-meta label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 400;
        }

        .login-meta input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            padding: 0;
        }

        .login-meta a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .login-meta a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #000;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 28px 0;
            color: var(--gray-medium);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--dark-light);
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 2px solid var(--dark-light);
            border-radius: 60px;
            background: var(--dark-light);
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--white);
        }

        .social-btn i {
            width: 18px;
            height: 18px;
        }

        .social-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        @media (max-width: 992px) {
            .login-wrapper {
                flex-direction: column;
            }
            .login-brand-panel {
                width: 100%;
                min-height: 320px;
                padding: 30px 20px;
            }
            .login-form-panel {
                width: 100%;
                padding: 40px 20px;
            }
            .brand-heading {
                font-size: 22px;
            }
            .brand-features {
                gap: 16px;
            }
            .feature-item {
                padding: 8px 16px;
            }
        }

        @media (max-width: 480px) {
            .social-grid {
                grid-template-columns: 1fr;
            }
            .brand-logo {
                font-size: 32px;
            }
            .form-header h1 {
                font-size: 28px;
            }
            .btn-submit {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- LEFT BRAND PANEL -->
        <div class="login-brand-panel">
            <div class="brand-logo">STACKLY<span style="color:#10b981;">TICKETING</span></div>
            <div class="brand-tagline">AI-Powered IT Support Platform</div>
            <h2 class="brand-heading">
                Automate workflows, resolve incidents 3x faster, and deliver exceptional support.
            </h2>
            <div class="brand-features">
                <div class="feature-item">
                    <i data-lucide="zap"></i>
                    <span>Smart Routing</span>
                </div>
                <div class="feature-item">
                    <i data-lucide="clock"></i>
                    <span>SLA Tracker</span>
                </div>
                <div class="feature-item">
                    <i data-lucide="shield-check"></i>
                    <span>Enterprise Security</span>
                </div>
            </div>
            <button type="button" class="back-home-btn" onclick="window.location.href='index.html'">
                ← BACK TO HOME
            </button>
        </div>

        <!-- RIGHT LOGIN FORM -->
        <div class="login-form-panel">
            <div class="form-container">
                <div class="form-header">
                    <h1>Welcome Back</h1>
                    <p>
                        Don't have an account?
                        <a href="getstarted.html">Create Account</a>
                    </p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Login as</label>
                        <div class="input-wrapper">
                            <i data-lucide="users" class="input-icon"></i>
                            <select id="role" required>
                                <option value="customer">Customer (End User)</option>
                                <option value="agent">Support Agent</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i data-lucide="mail" class="input-icon"></i>
                            <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i data-lucide="lock" class="input-icon"></i>
                            <input type="password" id="password" placeholder="Enter your password" autocomplete="off" required />
                        </div>
                    </div>

                    <div class="login-meta">
                        <label>
                            <input type="checkbox" /> Remember me
                        </label>
                        <a href="404.html">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-submit">
                        SIGN IN <i data-lucide="log-in" style="width:18px; height:18px; margin-left:6px;"></i>
                    </button>

                    <div class="divider">Or continue with</div>

                    <div class="social-grid">
                        <button type="button" class="social-btn" onclick="window.location.href='404.html'">
                            <i data-lucide="github"></i> GitHub
                        </button>
                        <button type="button" class="social-btn" onclick="window.location.href='404.html'">
                            <i data-lucide="chrome"></i> Google
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role').value;

            // Basic validation
            if (!email || !password) {
                alert('Please fill in both email and password.');
                return;
            }

            // Simple email format check
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address (e.g., name@example.com).');
                return;
            }

            // Demo: accept any non-empty password for now
            // Store user info in localStorage (simulate authentication)
            const userData = {
                name: role === 'admin' ? 'Admin User' : (role === 'agent' ? 'Support Agent' : 'Customer'),
                email: email,
                role: role,
                loggedInAt: new Date().toISOString()
            };
            localStorage.setItem('ticketing_user', JSON.stringify(userData));

            // Redirect based on role
            if (role === 'admin') {
                window.location.href = 'admindashboard.html';  // Replace with your admin page
            } else if (role === 'agent') {
                window.location.href = 'agentdashboard.html';  // Replace with your agent page
            } else {
                window.location.href = 'customerdashboard.html';        // Customer dashboard
            }
        });

        // Optional: clear any stale data on page load (clean start)
        window.onload = () => {
            document.getElementById('loginForm').reset();
        };
    </script>
</body>
</html>
