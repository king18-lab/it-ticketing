<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Page Not Found | IT Ticketing Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #000000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            position: relative;
            overflow-x: hidden;
        }

        /* animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#10b98115 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* floating animated elements */
        .floating-ticket {
            position: fixed;
            bottom: 30px;
            right: 30px;
            opacity: 0.08;
            font-size: 140px;
            pointer-events: none;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }

        .floating-ticket-2 {
            position: fixed;
            top: 20px;
            left: 20px;
            opacity: 0.05;
            font-size: 100px;
            pointer-events: none;
            z-index: 0;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
            20%, 40%, 60%, 80% { transform: translateX(3px); }
        }

        .error-container {
            max-width: 650px;
            width: 90%;
            margin: 2rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 3rem 2rem;
            border: 1px solid rgba(16, 185, 129, 0.4);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .ticket-icon {
            font-size: 5rem;
            color: #10b981;
            margin-bottom: 1rem;
            animation: shake 0.8s ease-in-out 0.5s both;
            display: inline-block;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #10b981, #34d399, #10b981);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            animation: fadeUp 0.6s ease-out 0.1s both;
        }

        .error-title {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #f1f5f9;
            animation: fadeUp 0.6s ease-out 0.2s both;
        }

        .error-message {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeUp 0.6s ease-out 0.3s both;
        }

        .button-group {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
            animation: fadeUp 0.6s ease-out 0.4s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.85rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            border: none;
        }

        .btn-primary {
            background: #10b981;
            color: #000000;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        .btn-primary i {
            color: #000000;
        }

        .btn-primary:hover {
            background: #0e9f6e;
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(16, 185, 129, 0.5);
            color: #e2e8f0;
            backdrop-filter: blur(4px);
        }

        .btn-secondary:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
        }

        .btn-secondary i {
            color: #10b981;
            transition: transform 0.2s;
        }

        .btn-secondary:hover i {
            transform: translateX(-3px);
        }

        /* creative extra touch */
        .help-text {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #5b6e8c;
            animation: fadeUp 0.6s ease-out 0.5s both;
        }

        @media (max-width: 550px) {
            .error-container {
                padding: 2rem 1.5rem;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .btn {
                padding: 0.7rem 1.4rem;
                font-size: 0.85rem;
            }
            .button-group {
                gap: 0.8rem;
            }
            .ticket-icon {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

<div class="floating-ticket">
    <i class="fas fa-ticket-alt"></i>
</div>
<div class="floating-ticket-2">
    <i class="fas fa-headset"></i>
</div>

<div class="error-container">
    <div class="ticket-icon">
        <i class="fas fa-ticket-alt"></i>
    </div>
    <div class="error-code">404</div>
    <h1 class="error-title">Ticket Not Found</h1>
    <p class="error-message">
        Oops! The page or ticket you're looking for doesn't exist,<br>
        has been moved, or you may have followed a broken link.
    </p>
    <div class="button-group">
        <!-- Previous Page Button -->
        <button class="btn btn-primary" id="prevPageBtn">
            <i class="fas fa-arrow-left"></i> Previous Page
        </button>
        <!-- Back to Home Button -->
        <a href="index.html" class="btn btn-secondary">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>
    <div class="help-text">
        <i class="fas fa-life-ring"></i> Need assistance? <a href="contact.html" style="color:#10b981; text-decoration:none;">Contact Support</a>
    </div>
</div>

<script>
    // Previous Page button: go back in browser history
    const prevBtn = document.getElementById('prevPageBtn');
    if (prevBtn) {
        prevBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // fallback if no history exists
                alert("No previous page in history. Use 'Back to Home' button.");
                window.location.href = 'index.html';
            }
        });
    }

    // Optional: small console greeting (for debugging)
    console.log('404 page ready — Use Previous Page or Back to Home.');
</script>
</body>
</html>
